name: Update TraceFence cask

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find newest TraceFence app release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release="$({ curl --fail --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/AI-Scarlett/TraceFence/releases?per_page=100"; } \
            | jq -c '[.[] | select(.draft == false and .prerelease == false and (.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")))][0]')"

          version="$(jq -r '.tag_name | sub("^v"; "")' <<<"${release}")"
          asset_url="$(jq -r --arg name "TraceFence-v${version}-arm64.dmg" '.assets[] | select(.name == $name) | .browser_download_url' <<<"${release}")"

          test -n "${version}"
          test -n "${asset_url}"
          test "${asset_url}" != "null"

          curl --fail --location --silent --show-error "${asset_url}" --output TraceFence.dmg
          sha256="$(sha256sum TraceFence.dmg | awk '{print $1}')"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${sha256}" >> "${GITHUB_OUTPUT}"

      - name: Update cask
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256: ${{ steps.release.outputs.sha256 }}
        run: |
          ruby -pi -e 'gsub(/^  version ".*"$/, "  version \"#{ENV.fetch("VERSION")}\""); gsub(/^  sha256 ".*"$/, "  sha256 \"#{ENV.fetch("SHA256")}\"")' Casks/tracefence.rb

      - name: Commit update
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/tracefence.rb
          git commit -m "tracefence ${VERSION}"
          git push
